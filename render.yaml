services:
  - type: web
    name: sentinel-ai-backend
    runtime: python
    rootDir: sentinel-ai/backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        value: sqlite:///sentinel.db
      - key: BRIGHTDATA_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
